<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Household Expense Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8fafc; }
    .bar { transition: width 0.4s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ─── Defaults ─────────────────────────────────────────────────────────────────
    const DEFAULT_TAGS = ["Common", "Travel", "Adam", "Zayn", "Other"];
    const DEFAULT_SUBS = [
      "Dining", "Groceries", "Transport", "Insurance",
      "Recreation", "Shopping", "Accommodation", "Fuel", "Pharmacy", "Other"
    ];

    // Known card profiles — used to auto-detect which card a file belongs to
    // and to normalise their different CSV column layouts
    const CARD_PROFILES = [
      {
        id: "neo",
        label: "Neo Financial",
        color: "bg-violet-100 text-violet-800",
        dot: "bg-violet-500",
        // Neo: Date, Description, Amount  (negative = spend)
        detect: (headers) => headers.includes("status") && headers.some(h => h.includes("posteddate") || h.includes("posted")),
        dateCol:   ["transactiondate","transaction_date","date"],
        descCol:   ["description","merchant","details"],
        amountCol: ["amount"],
        debitIsNegative: true,
      },
      {
        id: "ws",
        label: "Wealthsimple",
        color: "bg-emerald-100 text-emerald-800",
        dot: "bg-emerald-500",
        detect: (headers) => headers.some(h => h.includes("transaction_date") || h.includes("transactiondate") || h.includes("post_date") || h.includes("wealthsimple")),
        dateCol:   ["transaction_date","transactiondate","date"],
        descCol:   ["details","description","merchant name","payee"],
        amountCol: ["amount","debit"],
        debitIsNegative: false,
        typeCol:   "type",          // only import rows where type === "Purchase"
      },
      {
        id: "td-first",
        label: "TD First Class",
        color: "bg-green-100 text-green-800",
        dot: "bg-green-500",
        detect: (headers) => headers.some(h => h.includes("td") || h.includes("first class")),
        dateCol:   ["date","transaction date"],
        descCol:   ["description","transaction description"],
        amountCol: ["debit","amount","withdrawals"],
        debitIsNegative: false,
      },
      {
        id: "td-cash",
        label: "TD Cash Back",
        color: "bg-red-100 text-red-800",
        dot: "bg-red-500",
        detect: (headers) => false, // fallthrough — user picks manually
        dateCol:   ["date","transaction date"],
        descCol:   ["description","transaction description"],
        amountCol: ["debit","amount","withdrawals"],
        debitIsNegative: false,
      },
      {
        id: "generic",
        label: "Other / Generic",
        color: "bg-gray-100 text-gray-700",
        dot: "bg-gray-400",
        detect: () => true,
        dateCol:   ["date","transactiondate","trans.date"],
        descCol:   ["description","merchant","name","details","payee"],
        amountCol: ["amount","debit","credit","transactionamount"],
        debitIsNegative: false,
      },
    ];

    const CARD_COLORS = {};
    const CARD_DOTS   = {};
    CARD_PROFILES.forEach(p => { CARD_COLORS[p.id] = p.color; CARD_DOTS[p.id] = p.dot; });

    const KEYWORD_RULES = [
      { keywords: ["tim horton","zaatar","zythos","edo ","kfc","shanghai","mongolie","keg ","purdys","kernels","cows","pizza","donair","beach","grill","restaurant","bistro","cafe","sushi","burger","mcdonald","subway","wendy","starbucks"], sub: "Dining" },
      { keywords: ["costco","safeway","freshco","wal-mart","walmart","save on","save-on","grocery","superstore","whole foods","t&t","loblaws"], sub: "Groceries" },
      { keywords: ["compass","uber","paybyphone","parking","gs whistler","esso","petro","shell ","chevron","husky","parkplus","mobi","lyft"], sub: "Transport" },
      { keywords: ["bcaa","insurance","icbc"], sub: "Insurance" },
      { keywords: ["delta rec","flyoland"," ice ","excellent","rec centre","recreation","spa","yoga","gym","fitness","cinema","theatre","movie"], sub: "Recreation" },
      { keywords: ["lodge","hotel","inn","airbnb","marriott","hilton","westin","hyatt","fairmont","resort"], sub: "Accommodation" },
      { keywords: ["rexall","shoppers","pharmacy","pharmasave","london drugs","drug mart"], sub: "Pharmacy" },
      { keywords: ["samsonite","amazon","best buy","apple ","microsoft","sport chek","winners","homesense","ikea","h&m","zara","gap ","old navy","lululemon"], sub: "Shopping" },
      { keywords: ["gas","fuel","petrol","ultramar"], sub: "Fuel" },
    ];

    function autoCategory(description, subCats) {
      const lower = (description || "").toLowerCase();
      for (const rule of KEYWORD_RULES) {
        if (rule.keywords.some(k => lower.includes(k))) {
          return subCats.includes(rule.sub) ? rule.sub : (subCats[subCats.length - 1] || "Other");
        }
      }
      return subCats[subCats.length - 1] || "Other";
    }

    const STORAGE_KEY    = "expense-tracker-v2";
    const SETTINGS_KEY   = "expense-tracker-settings-v1";
    const LOADED_FILES_KEY = "expense-tracker-files-v1";

    // ─── Color palettes ───────────────────────────────────────────────────────────
    const TAG_COLOR_PALETTE = [
      "bg-blue-100 text-blue-800","bg-purple-100 text-purple-800",
      "bg-green-100 text-green-800","bg-amber-100 text-amber-800",
      "bg-rose-100 text-rose-800","bg-cyan-100 text-cyan-800",
      "bg-indigo-100 text-indigo-800","bg-orange-100 text-orange-800",
      "bg-gray-100 text-gray-700",
    ];
    const BAR_COLOR_PALETTE = [
      "bg-blue-500","bg-purple-500","bg-green-500","bg-amber-500",
      "bg-rose-500","bg-cyan-500","bg-indigo-500","bg-orange-500","bg-gray-400",
    ];
    const SUB_BAR_COLORS = [
      "bg-rose-400","bg-orange-400","bg-amber-400","bg-lime-400",
      "bg-emerald-400","bg-cyan-400","bg-sky-400","bg-violet-400",
      "bg-pink-400","bg-fuchsia-400","bg-red-400","bg-teal-400","bg-gray-400",
    ];

    // ─── CSV Parser ───────────────────────────────────────────────────────────────
    function splitLine(line, delim) {
      const result = []; let cur = ""; let inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuote = !inQuote; continue; }
        if (ch === delim && !inQuote) { result.push(cur.trim()); cur = ""; continue; }
        cur += ch;
      }
      result.push(cur.trim()); return result;
    }

    function pickCol(row, candidates) {
      for (const c of candidates) {
        const key = c.toLowerCase().replace(/\s+/g,"");
        if (row[key] !== undefined && row[key] !== "") return row[key];
      }
      return "";
    }

    function detectProfile(headers) {
      for (const p of CARD_PROFILES) {
        if (p.detect(headers)) return p;
      }
      return CARD_PROFILES[CARD_PROFILES.length - 1];
    }

    // TD exports have no header row: Date, Description, Debit, Credit, Balance
    const TD_INJECTED_HEADERS = ["date","description","debit","credit","balance"];

    function isHeaderless(firstLine, delim) {
      // If the first cell looks like a date (MM/DD/YYYY or YYYY-MM-DD) it's data, not a header
      const first = splitLine(firstLine, delim)[0] || "";
      return /^\d{2}\/\d{2}\/\d{4}$/.test(first.trim()) || /^\d{4}-\d{2}-\d{2}$/.test(first.trim());
    }

    function parseCSV(text, cardId, tags, subCats) {
      const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 1) return [];
      const delim = lines[0].includes("\t") ? "\t" : ",";

      let headers;
      let dataStartIdx;

      if (isHeaderless(lines[0], delim)) {
        // Inject known headers for TD (no-header format)
        headers = TD_INJECTED_HEADERS;
        dataStartIdx = 0;
      } else {
        // normalise: lowercase, strip spaces AND underscores so
        // "transaction_date" → "transactiondate" matches pickCol candidates
        headers = splitLine(lines[0], delim).map(h => h.toLowerCase().replace(/[\s_]+/g,""));
        dataStartIdx = 1;
      }

      // Determine profile: use provided cardId, or auto-detect
      const profile = cardId
        ? CARD_PROFILES.find(p => p.id === cardId) || detectProfile(headers)
        : detectProfile(headers);

      const rows = [];
      for (let i = dataStartIdx; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const cols = splitLine(lines[i], delim);
        const row = {};
        headers.forEach((h, idx) => { row[h] = cols[idx] || ""; });

        // If the profile has a typeCol, only import rows matching "Purchase"
        if (profile.typeCol) {
          const typeKey = profile.typeCol.toLowerCase().replace(/[\s_]+/g,"");
          const typeVal = (row[typeKey] || "").toLowerCase();
          if (typeVal && typeVal !== "purchase") continue;
        }

        const date   = pickCol(row, profile.dateCol.map(c => c.replace(/[\s_]+/g,"")));
        const desc   = pickCol(row, profile.descCol.map(c => c.replace(/[\s_]+/g,"")));
        const amtRaw = pickCol(row, profile.amountCol.map(c => c.replace(/[\s_]+/g,"")));
        let   amt    = parseFloat(amtRaw.replace(/[$,\s]/g, "")) || 0;
        if (profile.debitIsNegative) amt = Math.abs(amt);
        if (amt <= 0) continue;
        if (!desc) continue;

        rows.push({
          id: `${profile.id}-${i}-${date}-${desc}`,
          date, description: desc, amount: amt,
          card: profile.id,
          tag: tags[0] || "Common",
          sub: autoCategory(desc, subCats),
        });
      }
      return rows;
    }

    // ─── Manage Categories Modal ──────────────────────────────────────────────────
    function ManageModal({ tags, subCats, onClose, onSave }) {
      const [localTags, setLocalTags] = useState([...tags]);
      const [localSubs, setLocalSubs] = useState([...subCats]);
      const [newTag, setNewTag] = useState("");
      const [newSub, setNewSub] = useState("");
      const tagRef = useRef(null);
      const subRef = useRef(null);

      const addTag = () => {
        const v = newTag.trim();
        if (!v || localTags.includes(v)) return;
        setLocalTags(p => [...p, v]); setNewTag(""); tagRef.current?.focus();
      };
      const addSub = () => {
        const v = newSub.trim();
        if (!v || localSubs.includes(v)) return;
        setLocalSubs(p => [...p, v]); setNewSub(""); subRef.current?.focus();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose} />
          <div className="relative bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] flex flex-col">
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100">
              <h2 className="text-lg font-semibold text-gray-900">Manage Categories</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>
            <div className="overflow-y-auto flex-1 px-6 py-5 space-y-6">
              {[
                { label: "Top-level Tags", items: localTags, setItems: setLocalTags, newVal: newTag, setNew: setNewTag, add: addTag, ref: tagRef, palette: TAG_COLOR_PALETTE },
                { label: "Sub-Categories", items: localSubs, setItems: setLocalSubs, newVal: newSub, setNew: setNewSub, add: addSub, ref: subRef, palette: null },
              ].map(({ label, items, setItems, newVal, setNew, add, ref, palette }) => (
                <div key={label}>
                  <h3 className="text-sm font-semibold text-gray-700 mb-2">{label}</h3>
                  <div className="flex flex-wrap gap-2 mb-3">
                    {items.map((t, i) => (
                      <span key={t} className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-medium ${palette ? palette[i % palette.length] : "bg-gray-100 text-gray-700"}`}>
                        {t}
                        {items.length > 1 && (
                          <button onClick={() => setItems(p => p.filter(x => x !== t))} className="ml-0.5 hover:opacity-60 font-bold">&times;</button>
                        )}
                      </span>
                    ))}
                  </div>
                  <div className="flex gap-2">
                    <input ref={ref} type="text" value={newVal} onChange={e => setNew(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && add()}
                      placeholder={`New ${label.toLowerCase().replace("top-level ","")}…`}
                      className="flex-1 text-sm px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-300" />
                    <button onClick={add} className="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700">Add</button>
                  </div>
                </div>
              ))}
              <p className="text-xs text-gray-400">Removing a tag or sub-category reassigns affected transactions to the first remaining option.</p>
            </div>
            <div className="flex justify-end gap-2 px-6 py-4 border-t border-gray-100">
              <button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200">Cancel</button>
              <button onClick={() => onSave(localTags, localSubs)} className="px-5 py-2 text-sm font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700">Save</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Upload Modal ─────────────────────────────────────────────────────────────
    function UploadModal({ onClose, onLoad, tags, subCats }) {
      const [selectedCard, setSelectedCard] = useState("neo");
      const [dragOver, setDragOver]         = useState(false);
      const [pending, setPending]           = useState([]); // [{name, text, cardId}]

      const readFiles = (files) => {
        Array.from(files).forEach(file => {
          const reader = new FileReader();
          reader.onload = e => {
            setPending(prev => {
              // auto-detect card from headers
              const lines = e.target.result.trim().split(/\r?\n/);
              const delim = lines[0]?.includes("\t") ? "\t" : ",";
              const headers = splitLine(lines[0] || "", delim).map(h => h.toLowerCase().replace(/[\s_]+/g,""));
              const detected = detectProfile(headers);
              // Don't duplicate by filename
              if (prev.find(p => p.name === file.name)) return prev;
              return [...prev, { name: file.name, text: e.target.result, cardId: detected.id }];
            });
          };
          reader.readAsText(file);
        });
      };

      const handleDrop = e => { e.preventDefault(); setDragOver(false); readFiles(e.dataTransfer.files); };
      const updateCardId = (name, cardId) => setPending(prev => prev.map(p => p.name === name ? { ...p, cardId } : p));
      const remove = (name) => setPending(prev => prev.filter(p => p.name !== name));

      const load = () => {
        if (pending.length === 0) return;
        let allRows = [];
        pending.forEach(({ text, cardId }) => {
          allRows = allRows.concat(parseCSV(text, cardId, tags, subCats));
        });
        onLoad(allRows, pending.map(p => ({ name: p.name, cardId: p.cardId })));
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose} />
          <div className="relative bg-white rounded-2xl shadow-xl w-full max-w-xl flex flex-col max-h-[90vh]">
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100">
              <h2 className="text-lg font-semibold text-gray-900">Upload Statements</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>

            <div className="flex-1 overflow-y-auto px-6 py-5 space-y-4">
              {/* Drop zone */}
              <div
                onDragOver={e => { e.preventDefault(); setDragOver(true); }}
                onDragLeave={() => setDragOver(false)}
                onDrop={handleDrop}
                onClick={() => document.getElementById("multiCsvInput").click()}
                className={`border-2 border-dashed rounded-xl p-6 text-center cursor-pointer transition-colors ${dragOver ? "border-blue-400 bg-blue-50" : "border-gray-200 hover:border-blue-300"}`}
              >
                <input id="multiCsvInput" type="file" accept=".csv,.txt" multiple className="hidden"
                  onChange={e => readFiles(e.target.files)} />
                <div className="text-3xl mb-1">📂</div>
                <p className="text-sm text-gray-500">Drop one or more CSV files, or click to browse</p>
                <p className="text-xs text-gray-400 mt-0.5">You can upload all cards at once</p>
              </div>

              {/* Pending files list */}
              {pending.length > 0 && (
                <div className="space-y-2">
                  {pending.map(({ name, cardId }) => (
                    <div key={name} className="flex items-center gap-3 bg-gray-50 rounded-xl px-4 py-2.5">
                      <span className="flex-1 text-sm text-gray-700 truncate">{name}</span>
                      <select
                        value={cardId}
                        onChange={e => updateCardId(name, e.target.value)}
                        className="text-xs rounded-lg px-2 py-1 bg-white border border-gray-200 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-300"
                      >
                        {CARD_PROFILES.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}
                      </select>
                      <button onClick={() => remove(name)} className="text-gray-400 hover:text-red-500 text-lg leading-none">&times;</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="flex justify-end gap-2 px-6 py-4 border-t border-gray-100">
              <button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200">Cancel</button>
              <button
                onClick={load}
                disabled={pending.length === 0}
                className="px-5 py-2 text-sm font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                Import {pending.length > 0 ? `${pending.length} file${pending.length > 1 ? "s" : ""}` : ""}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── BarRow ───────────────────────────────────────────────────────────────────
    function BarRow({ label, amount, total, color }) {
      const pct = total > 0 ? (amount / total) * 100 : 0;
      return (
        <div className="mb-2">
          <div className="flex justify-between text-sm mb-0.5">
            <span className="font-medium text-gray-700">{label}</span>
            <span className="text-gray-800">${amount.toFixed(2)} <span className="text-gray-400 text-xs">({pct.toFixed(1)}%)</span></span>
          </div>
          <div className="h-3 bg-gray-100 rounded-full overflow-hidden">
            <div className={`h-full bar ${color} rounded-full`} style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    }

    // ─── Dashboard ────────────────────────────────────────────────────────────────
    function Dashboard({ rows, tags, subCats }) {
      const [selectedCard, setSelectedCard] = useState("All");
      const [selectedTag,  setSelectedTag]  = useState("All");

      // Reset tag selection when card changes
      const handleCardSelect = (cardId) => {
        setSelectedCard(cardId);
        setSelectedTag("All");
      };

      // Grand totals per card (always uses all rows)
      const byCard = useMemo(() => {
        const m = {};
        rows.forEach(r => { m[r.card] = (m[r.card] || 0) + r.amount; });
        return m;
      }, [rows]);
      const cardEntries  = CARD_PROFILES.filter(p => byCard[p.id] > 0);
      const grandTotal   = rows.reduce((s, r) => s + r.amount, 0);

      // Card-filtered rows
      const cardRows = useMemo(() =>
        selectedCard === "All" ? rows : rows.filter(r => r.card === selectedCard),
      [rows, selectedCard]);

      // Tag totals (over card-filtered rows)
      const byTag = useMemo(() => {
        const m = {}; tags.forEach(t => { m[t] = 0; });
        cardRows.forEach(r => { m[r.tag] = (m[r.tag] || 0) + r.amount; });
        return m;
      }, [cardRows, tags]);
      const cardTotal = cardRows.reduce((s, r) => s + r.amount, 0);

      // Sub-cat rows: card-filtered + tag-filtered
      const subRows = useMemo(() =>
        selectedTag === "All" ? cardRows : cardRows.filter(r => r.tag === selectedTag),
      [cardRows, selectedTag]);

      const bySub = useMemo(() => {
        const m = {}; subCats.forEach(s => { m[s] = 0; });
        subRows.forEach(r => { m[r.sub] = (m[r.sub] || 0) + r.amount; });
        return m;
      }, [subRows, subCats]);
      const subTotal = subRows.reduce((s, r) => s + r.amount, 0);

      const subEntries = subCats
        .map((s, i) => ({ label: s, amount: bySub[s] || 0, color: SUB_BAR_COLORS[i % SUB_BAR_COLORS.length] }))
        .filter(e => e.amount > 0).sort((a, b) => b.amount - a.amount);

      if (rows.length === 0) return null;

      const selectedProfile = CARD_PROFILES.find(p => p.id === selectedCard);

      return (
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">

          {/* Left: By Tag + By Card */}
          <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
            <div className="flex items-start justify-between mb-3 gap-2">
              <div>
                <h2 className="text-lg font-semibold text-gray-800">By Tag</h2>
                {selectedCard !== "All" && (
                  <span className={`inline-block mt-0.5 text-xs font-medium px-2 py-0.5 rounded-full ${selectedProfile?.color}`}>
                    {selectedProfile?.label}
                  </span>
                )}
              </div>
              <span className="text-2xl font-bold text-gray-900 whitespace-nowrap">${cardTotal.toFixed(2)}</span>
            </div>

            {/* Clickable tag rows */}
            <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">Tags <span className="normal-case font-normal">— click to filter sub-categories</span></p>
            {[{ id: "All", label: "All Tags", colorIdx: -1 }, ...tags.filter(t => byTag[t] > 0).map((t, i) => ({ id: t, label: t, colorIdx: i }))].map(({ id, label, colorIdx }) => {
              const amount = id === "All" ? cardTotal : byTag[id] || 0;
              const color  = colorIdx < 0 ? "bg-gray-400" : BAR_COLOR_PALETTE[colorIdx % BAR_COLOR_PALETTE.length];
              const active = selectedTag === id;
              return (
                <div key={id} onClick={() => setSelectedTag(id)}
                  className={`rounded-xl px-3 py-1 mb-1 cursor-pointer transition-colors ${active ? "bg-gray-50 ring-1 ring-gray-200" : "hover:bg-gray-50"}`}>
                  <BarRow label={label} amount={amount} total={cardTotal} color={color} />
                </div>
              );
            })}

            {/* Clickable card rows */}
            {cardEntries.length > 1 && (
              <>
                <div className="border-t border-gray-100 my-3" />
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5">By Card <span className="normal-case font-normal">— click to filter</span></p>
                {[{ id: "All", label: "All Cards", color: "bg-gray-100", dot: "bg-gray-400" }, ...cardEntries].map(p => {
                  const amount = p.id === "All" ? grandTotal : byCard[p.id] || 0;
                  const active = selectedCard === p.id;
                  return (
                    <div key={p.id} onClick={() => handleCardSelect(p.id)}
                      className={`rounded-xl px-3 py-1 mb-1 cursor-pointer transition-colors ${active ? "bg-gray-50 ring-1 ring-gray-200" : "hover:bg-gray-50"}`}>
                      <BarRow label={p.label} amount={amount} total={grandTotal} color={p.dot} />
                    </div>
                  );
                })}
              </>
            )}
          </div>

          {/* Right: By Sub-Category */}
          {subEntries.length > 0 && (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
              <div className="flex items-center justify-between mb-1 gap-2">
                <h2 className="text-lg font-semibold text-gray-800">By Sub-Category</h2>
                <span className="text-2xl font-bold text-gray-900 whitespace-nowrap">${subTotal.toFixed(2)}</span>
              </div>
              <div className="flex flex-wrap gap-1.5 mb-3">
                {selectedCard !== "All" && (
                  <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${selectedProfile?.color}`}>{selectedProfile?.label}</span>
                )}
                {selectedTag !== "All" && (
                  <span className="text-xs font-medium px-2 py-0.5 rounded-full bg-blue-100 text-blue-800">{selectedTag}</span>
                )}
              </div>
              {subEntries.map(e => <BarRow key={e.label} label={e.label} amount={e.amount} total={subTotal} color={e.color} />)}
            </div>
          )}
        </div>
      );
    }

    // ─── Transaction Row ──────────────────────────────────────────────────────────
    function TransactionRow({ row, onChange, onRemove, tags, subCats }) {
      const tagIdx   = tags.indexOf(row.tag);
      const tagColor = TAG_COLOR_PALETTE[tagIdx >= 0 ? tagIdx : TAG_COLOR_PALETTE.length - 1];
      const cardProfile = CARD_PROFILES.find(p => p.id === row.card) || CARD_PROFILES[CARD_PROFILES.length - 1];

      return (
        <tr className="border-b border-gray-50 hover:bg-gray-50 transition-colors group">
          <td className="py-2.5 px-3 text-sm text-gray-500 whitespace-nowrap">{row.date}</td>
          <td className="py-2.5 px-3 text-sm text-gray-800 max-w-xs truncate" title={row.description}>{row.description}</td>
          <td className="py-2.5 px-3 text-sm font-medium text-gray-900 text-right whitespace-nowrap">${row.amount.toFixed(2)}</td>
          <td className="py-2.5 px-3 whitespace-nowrap">
            <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${cardProfile.color}`}>{cardProfile.label}</span>
          </td>
          <td className="py-2.5 px-3">
            <select value={tags.includes(row.tag) ? row.tag : tags[0]}
              onChange={e => onChange({ ...row, tag: e.target.value })}
              className={`text-xs font-medium rounded-lg px-2 py-1 border-0 cursor-pointer focus:ring-2 focus:ring-blue-300 ${tagColor}`}>
              {tags.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
          </td>
          <td className="py-2.5 px-3">
            <select value={subCats.includes(row.sub) ? row.sub : subCats[0]}
              onChange={e => onChange({ ...row, sub: e.target.value })}
              className="text-xs rounded-lg px-2 py-1 bg-gray-100 text-gray-700 border-0 cursor-pointer focus:ring-2 focus:ring-blue-300">
              {subCats.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </td>
          <td className="py-2.5 px-3">
            <button onClick={() => onRemove(row.id)}
              className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400 transition-all text-base leading-none">✕</button>
          </td>
        </tr>
      );
    }

    // ─── Main App ─────────────────────────────────────────────────────────────────
    function App() {
      const [rows, setRows] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
      });
      const [loadedFiles, setLoadedFiles] = useState(() => {
        try { return JSON.parse(localStorage.getItem(LOADED_FILES_KEY)) || []; } catch { return []; }
      });
      const [settings, setSettings] = useState(() => {
        try {
          const s = JSON.parse(localStorage.getItem(SETTINGS_KEY));
          return s || { tags: DEFAULT_TAGS, subCats: DEFAULT_SUBS };
        } catch { return { tags: DEFAULT_TAGS, subCats: DEFAULT_SUBS }; }
      });

      const { tags, subCats } = settings;

      const [filter, setFilter]         = useState("");
      const [tagFilter, setTagFilter]   = useState("All");
      const [subFilter, setSubFilter]   = useState("All");
      const [cardFilter, setCardFilter] = useState("All");
      const [showManage, setShowManage] = useState(false);
      const [showUpload, setShowUpload] = useState(false);

      useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(rows)); }, [rows]);
      useEffect(() => { localStorage.setItem(LOADED_FILES_KEY, JSON.stringify(loadedFiles)); }, [loadedFiles]);
      useEffect(() => { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }, [settings]);

      const handleLoad = useCallback((newRows, files) => {
        setRows(prev => {
          const map = {};
          prev.forEach(r => { map[r.id] = r; });
          // Merge new, preserving existing categorisations
          const merged = [...prev];
          newRows.forEach(r => {
            if (map[r.id]) return; // already exists
            merged.push(r);
          });
          return merged;
        });
        setLoadedFiles(prev => {
          const names = new Set(prev.map(f => f.name));
          return [...prev, ...files.filter(f => !names.has(f.name))];
        });
      }, []);

      const updateRow  = useCallback((updated) => setRows(prev => prev.map(r => r.id === updated.id ? updated : r)), []);
      const removeRow  = useCallback((id) => setRows(prev => prev.filter(r => r.id !== id)), []);
      const removeFile = (name) => {
        setLoadedFiles(prev => prev.filter(f => f.name !== name));
        // Optionally remove rows from that file (matching prefix)
        // We don't track file→row mapping so just leave rows; user can clear manually
      };

      const handleSaveSettings = (newTags, newSubs) => {
        setSettings({ tags: newTags, subCats: newSubs });
        setRows(prev => prev.map(r => ({
          ...r,
          tag: newTags.includes(r.tag) ? r.tag : newTags[0],
          sub: newSubs.includes(r.sub) ? r.sub : newSubs[newSubs.length - 1],
        })));
        setTagFilter("All");
        setShowManage(false);
      };

      const exportCSV = () => {
        const header = "Date,Description,Amount,Card,Tag,SubCategory\n";
        const body = rows.map(r =>
          `"${r.date}","${r.description.replace(/"/g,'""')}",${r.amount},"${r.card}","${r.tag}","${r.sub}"`
        ).join("\n");
        const blob = new Blob([header + body], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "categorized-expenses.csv"; a.click();
        URL.revokeObjectURL(url);
      };

      const clearAll = () => {
        if (confirm("Clear all transactions and loaded files?")) { setRows([]); setLoadedFiles([]); }
      };

      const activeCards = useMemo(() => [...new Set(rows.map(r => r.card))], [rows]);

      const filtered = useMemo(() => {
        let r = rows;
        if (cardFilter !== "All") r = r.filter(x => x.card === cardFilter);
        if (tagFilter  !== "All") r = r.filter(x => x.tag  === tagFilter);
        if (subFilter  !== "All") r = r.filter(x => x.sub  === subFilter);
        if (filter.trim()) {
          const q = filter.toLowerCase();
          r = r.filter(x => x.description.toLowerCase().includes(q) || x.date.includes(q));
        }
        return r;
      }, [rows, filter, tagFilter, subFilter, cardFilter]);

      return (
        <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
          {showManage && <ManageModal tags={tags} subCats={subCats} onClose={() => setShowManage(false)} onSave={handleSaveSettings} />}
          {showUpload && <UploadModal tags={tags} subCats={subCats} onClose={() => setShowUpload(false)} onLoad={handleLoad} />}

          {/* Header */}
          <div className="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div>
              <h1 className="text-2xl font-bold text-gray-900">Household Expense Tracker</h1>
              <p className="text-sm text-gray-500 mt-0.5">{rows.length} transactions across {activeCards.length || 0} card{activeCards.length !== 1 ? "s" : ""}</p>
            </div>
            <div className="flex gap-2 flex-wrap">
              <button onClick={() => setShowUpload(true)} className="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 transition-colors">
                + Upload Statements
              </button>
              <button onClick={() => setShowManage(true)} className="px-4 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-xl hover:bg-gray-200 transition-colors">
                ⚙ Categories
              </button>
              {rows.length > 0 && (
                <>
                  <button onClick={exportCSV} className="px-4 py-2 bg-gray-100 text-gray-700 text-sm font-medium rounded-xl hover:bg-gray-200 transition-colors">
                    Export CSV
                  </button>
                  <button onClick={clearAll} className="px-4 py-2 bg-gray-100 text-gray-600 text-sm font-medium rounded-xl hover:bg-gray-200 transition-colors">
                    Clear All
                  </button>
                </>
              )}
            </div>
          </div>

          {/* Loaded files chips */}
          {loadedFiles.length > 0 && (
            <div className="flex flex-wrap gap-2 mb-5">
              {loadedFiles.map(f => {
                const profile = CARD_PROFILES.find(p => p.id === f.cardId) || CARD_PROFILES[CARD_PROFILES.length - 1];
                return (
                  <span key={f.name} className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium ${profile.color}`}>
                    <span className={`w-1.5 h-1.5 rounded-full ${profile.dot}`} />
                    {f.name}
                    <button onClick={() => removeFile(f.name)} className="ml-0.5 hover:opacity-60">&times;</button>
                  </span>
                );
              })}
            </div>
          )}

          {/* Empty state */}
          {rows.length === 0 && (
            <div
              onClick={() => setShowUpload(true)}
              className="mb-6 border-2 border-dashed border-gray-200 bg-white rounded-2xl p-12 text-center cursor-pointer hover:border-blue-300 transition-colors"
            >
              <div className="text-5xl mb-3">📂</div>
              <p className="text-gray-500 font-medium">Upload your credit card statements to get started</p>
              <p className="text-xs text-gray-400 mt-1">Supports Neo Financial, Wealthsimple, TD First Class, TD Cash Back</p>
            </div>
          )}

          {rows.length > 0 && (
            <>
              <Dashboard rows={rows} tags={tags} subCats={subCats} />

              {/* Filter bar */}
              <div className="bg-white rounded-2xl border border-gray-100 shadow-sm px-4 py-3 mb-4 space-y-2.5">
                {/* Search */}
                <input type="text" placeholder="Search transactions…" value={filter}
                  onChange={e => setFilter(e.target.value)}
                  className="w-full px-4 py-2 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />

                {/* Card filter */}
                {activeCards.length > 1 && (
                  <div className="flex gap-1.5 flex-wrap items-center">
                    <span className="text-xs text-gray-400 font-medium w-16 shrink-0">Card</span>
                    {["All", ...activeCards].map(c => {
                      const profile = CARD_PROFILES.find(p => p.id === c);
                      return (
                        <button key={c} onClick={() => setCardFilter(c)}
                          className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors ${cardFilter === c ? "bg-gray-800 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                          {c === "All" ? "All" : profile?.label || c}
                        </button>
                      );
                    })}
                  </div>
                )}

                {/* Tag filter */}
                <div className="flex gap-1.5 flex-wrap items-center">
                  <span className="text-xs text-gray-400 font-medium w-16 shrink-0">Tag</span>
                  {["All", ...tags].map(t => (
                    <button key={t} onClick={() => setTagFilter(t)}
                      className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors ${tagFilter === t ? "bg-blue-600 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                      {t}
                    </button>
                  ))}
                </div>

                {/* Sub-category filter */}
                <div className="flex gap-1.5 flex-wrap items-center">
                  <span className="text-xs text-gray-400 font-medium w-16 shrink-0">Sub</span>
                  {["All", ...subCats].map(s => (
                    <button key={s} onClick={() => setSubFilter(s)}
                      className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors ${subFilter === s ? "bg-violet-600 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                      {s}
                    </button>
                  ))}
                </div>
              </div>

              {/* Table */}
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead>
                      <tr className="bg-gray-50 border-b border-gray-100">
                        <th className="py-3 px-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Date</th>
                        <th className="py-3 px-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Description</th>
                        <th className="py-3 px-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wide">Amount</th>
                        <th className="py-3 px-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Card</th>
                        <th className="py-3 px-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Tag</th>
                        <th className="py-3 px-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wide">Sub-Category</th>
                        <th className="py-3 px-3 w-8" />
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.length === 0
                        ? <tr><td colSpan={7} className="py-10 text-center text-gray-400 text-sm">No transactions match your filter.</td></tr>
                        : filtered.map(r => (
                          <TransactionRow key={r.id} row={r} onChange={updateRow} onRemove={removeRow} tags={tags} subCats={subCats} />
                        ))
                      }
                    </tbody>
                  </table>
                </div>
                {filtered.length > 0 && (
                  <div className="px-3 py-2 border-t border-gray-50 text-xs text-gray-400 text-right">
                    Showing {filtered.length} of {rows.length} ·{" "}
                    Total: <span className="font-semibold text-gray-600">${filtered.reduce((s,r)=>s+r.amount,0).toFixed(2)}</span>
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // NET WORTH TRACKER

    function fmtCurrency(n) {
      if (n == null || isNaN(n)) return "—";
      const abs = Math.abs(n);
      const str = abs.toLocaleString("en-CA", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return n < 0 ? `($${str})` : `$${str}`;
    }

    function calcNW(snapshot) {
      if (!snapshot) return 0;
      return ALL_ACCOUNTS
        .filter(a => !a.excludeFromNW)
        .reduce((s, a) => s + (parseFloat(snapshot[a.id]) || 0), 0);
    }

    // ── Add Snapshot Modal ────────────────────────────────────────────────────────
    function AddSnapshotModal({ snapshots, onClose, onSave }) {
      const today = new Date().toISOString().split("T")[0];
      const [date, setDate] = useState(today);
      const [values, setValues] = useState(() => {
        // Prefill from latest snapshot
        const last = snapshots[snapshots.length - 1];
        const v = {};
        ALL_ACCOUNTS.forEach(a => { v[a.id] = last ? (last[a.id] ?? "") : ""; });
        return v;
      });
      const [notes, setNotes] = useState({});

      const set = (id, val) => setValues(p => ({ ...p, [id]: val }));
      const setNote = (id, val) => setNotes(p => ({ ...p, [id]: val }));

      const nwPreview = ALL_ACCOUNTS
        .filter(a => !a.excludeFromNW)
        .reduce((s, a) => s + (parseFloat(values[a.id]) || 0), 0);

      const save = () => {
        if (!date) return;
        const snap = { date, notes: { ...notes } };
        ALL_ACCOUNTS.forEach(a => { snap[a.id] = parseFloat(values[a.id]) || 0; });
        onSave(snap);
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose} />

                <h2 className="text-lg font-semibold text-gray-900">Add Snapshot</h2>

              </div>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            </div>

            <div className="overflow-y-auto flex-1 px-6 py-4 space-y-5">
              <div>
                <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Snapshot Date</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)}
                  className="mt-1 block w-48 text-sm px-3 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-300" />
              </div>

              {NW_SECTIONS.map(section => (
                <div key={section.id}>
                  <div className="text-xs font-bold px-3 py-1.5 rounded-lg mb-2 text-white" style={{ background: section.color }}>
                    {section.label}
                  </div>
                  <div className="space-y-1.5">
                    {section.accounts.map(acc => (
                      <div key={acc.id} className="grid grid-cols-12 gap-2 items-center">
                        <div className="col-span-5 text-sm text-gray-700 truncate">{acc.name}</div>
                        <div className="col-span-2 text-xs text-gray-400">{acc.owner}</div>
                        <div className="col-span-5">
                          <input
                            type="number" step="0.01"
                            value={values[acc.id]}
                            onChange={e => set(acc.id, e.target.value)}
                            placeholder="0.00"
                            className="w-full text-sm px-2 py-1.5 border border-gray-200 rounded-lg text-right focus:outline-none focus:ring-2 focus:ring-blue-300 font-mono text-blue-700"
                          />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            <div className="flex justify-between items-center gap-2 px-6 py-4 border-t border-gray-100">
              <span className="text-sm font-semibold text-gray-700">Net Worth: <span className="text-green-700">{fmtCurrency(nwPreview)}</span></span>
              <div className="flex gap-2">
                <button onClick={onClose} className="px-4 py-2 text-sm text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200">Cancel</button>
                <button onClick={save} className="px-5 py-2 text-sm font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700">Save Snapshot</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Net Worth Tab ─────────────────────────────────────────────────────────────
    function NetWorthTab() {
      const [snapshots, setSnapshots] = useState(() => {
        try { return JSON.parse(localStorage.getItem(NW_KEY)) || []; } catch { return []; }
      });
      const [showAdd, setShowAdd] = useState(false);
      const [editIdx, setEditIdx] = useState(null);

      useEffect(() => { localStorage.setItem(NW_KEY, JSON.stringify(snapshots)); }, [snapshots]);

      const addSnapshot = (snap) => setSnapshots(prev => [...prev, snap].sort((a,b) => a.date.localeCompare(b.date)));
      const deleteSnapshot = (idx) => { if (confirm("Delete this snapshot?")) setSnapshots(prev => prev.filter((_,i) => i !== idx)); };

      // Latest and previous snapshot
      const latest = snapshots[snapshots.length - 1];
      const prev   = snapshots[snapshots.length - 2];
      const latestNW = calcNW(latest);
      const prevNW   = calcNW(prev);
      const nwChange = latest && prev ? latestNW - prevNW : null;

      // Show up to 5 most recent snapshots as columns
      const displaySnaps = snapshots.slice(-5);

      return (
        <div className="max-w-7xl mx-auto p-4 md:p-8">
          {showAdd && <AddSnapshotModal snapshots={snapshots} onClose={() => setShowAdd(false)} onSave={addSnapshot} />}

          {/* Header */}
          <div className="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div>
              <h1 className="text-2xl font-bold text-gray-900">EL-ASSAAD FAMILY — NET WORTH</h1>
              <p className="text-sm text-gray-500 mt-0.5">Excludes kids RESP accounts · {snapshots.length} snapshot{snapshots.length !== 1 ? "s" : ""}</p>
            </div>
            <button onClick={() => setShowAdd(true)}
              className="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-xl hover:bg-blue-700 transition-colors">
              + Add Snapshot
            </button>
          </div>

          {/* KPI cards */}
          {latest && (
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
              {[
                { label: "Current Net Worth", value: fmtCurrency(latestNW), sub: latest.date, color: "text-gray-900" },
                { label: "Change (last snapshot)", value: nwChange != null ? fmtCurrency(nwChange) : "—", sub: prev ? `vs ${prev.date}` : "—", color: nwChange >= 0 ? "text-green-600" : "text-red-600" },
                { label: "To $1M Goal", value: fmtCurrency(1000000 - latestNW), sub: `${((latestNW/1000000)*100).toFixed(1)}% complete`, color: "text-blue-700" },
                { label: "Snapshots Logged", value: snapshots.length, sub: `First: ${snapshots[0]?.date || "—"}`, color: "text-gray-700" },
              ].map(k => (
                <div key={k.label} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
                  <div className="text-xs text-gray-400 font-medium mb-1">{k.label}</div>
                  <div className={`text-xl font-bold ${k.color}`}>{k.value}</div>
                  <div className="text-xs text-gray-400 mt-0.5">{k.sub}</div>
                </div>
              ))}
            </div>
          )}

          {/* Main account table */}
          {snapshots.length === 0 ? (
            <div onClick={() => setShowAdd(true)}
              className="border-2 border-dashed border-gray-200 bg-white rounded-2xl p-12 text-center cursor-pointer hover:border-blue-300 transition-colors">
              <div className="text-5xl mb-3">💰</div>
              <p className="text-gray-500 font-medium">Add your first snapshot to get started</p>
              <p className="text-xs text-gray-400 mt-1">Log balances across all accounts to track your net worth over time</p>
            </div>
          ) : (
            <>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr>
                        <th colSpan={4} className="py-3 px-4 text-left text-xs font-semibold text-white uppercase tracking-wide" style={{ background: "#1F4E79" }}>
                          Account
                        </th>
                        {displaySnaps.map(s => (
                          <th key={s.date} className="py-3 px-3 text-right text-xs font-semibold text-white whitespace-nowrap" style={{ background: "#1F4E79" }}>
                            {s.date}
                          </th>
                        ))}
                        <th className="py-3 px-3 text-right text-xs font-semibold text-white whitespace-nowrap" style={{ background: "#1F4E79" }}>Change $</th>
                        <th className="py-3 px-3 w-8" style={{ background: "#1F4E79" }} />
                      </tr>
                      <tr className="text-xs text-gray-500" style={{ background: "#D6E4F0" }}>
                        <th className="py-1.5 px-4 text-left font-medium">Name</th>
                        <th className="py-1.5 px-3 text-left font-medium">Owner</th>
                        <th className="py-1.5 px-3 text-left font-medium">Type</th>
                        <th className="py-1.5 px-3 text-left font-medium">Institution</th>
                        {displaySnaps.map(s => <th key={s.date} className="py-1.5 px-3" />)}
                        <th colSpan={2} />
                      </tr>
                    </thead>
                    <tbody>
                      {NW_SECTIONS.map(section => {
                        const sectionTotal = (snap) => snap ? section.accounts.reduce((s,a) => s+(parseFloat(snap[a.id])||0), 0) : null;
                        const latestSec = sectionTotal(latest);
                        const prevSec   = sectionTotal(prev);
                        return (
                          <React.Fragment key={section.id}>
                            {/* Section header */}
                            <tr>
                              <td colSpan={4 + displaySnaps.length + 2} className="py-2 px-4 text-xs font-bold text-white" style={{ background: section.color }}>
                                {section.label}
                              </td>
                            </tr>
                            {/* Account rows */}
                            {section.accounts.map((acc, ai) => {
                              const latestVal = latest ? (parseFloat(latest[acc.id]) || 0) : null;
                              const prevVal   = prev   ? (parseFloat(prev[acc.id])   || 0) : null;
                              const change    = latestVal != null && prevVal != null ? latestVal - prevVal : null;
                              return (
                                <tr key={acc.id} className={`border-b border-gray-50 ${ai % 2 === 0 ? "bg-white" : "bg-gray-50/50"}`}>
                                  <td className="py-2 px-4 text-gray-800 font-medium whitespace-nowrap">{acc.name}</td>
                                  <td className="py-2 px-3 text-gray-400 text-xs">{acc.owner}</td>
                                  <td className="py-2 px-3 text-gray-400 text-xs">{acc.type}</td>
                                  <td className="py-2 px-3 text-gray-400 text-xs">{acc.institution}</td>
                                  {displaySnaps.map(s => (
                                    <td key={s.date} className="py-2 px-3 text-right font-mono text-xs text-blue-700 whitespace-nowrap">
                                      {fmtCurrency(parseFloat(s[acc.id]) || 0)}
                                    </td>
                                  ))}
                                  <td className={`py-2 px-3 text-right font-mono text-xs whitespace-nowrap font-semibold ${change == null ? "text-gray-300" : change >= 0 ? "text-green-600" : "text-red-600"}`}>
                                    {change != null ? fmtCurrency(change) : "—"}
                                  </td>
                                  <td />
                                </tr>
                              );
                            })}
                            {/* Section total */}
                            <tr className="border-b-2 border-gray-200">
                              <td colSpan={4} className="py-2 px-4 text-xs font-bold text-gray-600 uppercase">Total — {section.label}</td>
                              {displaySnaps.map(s => (
                                <td key={s.date} className="py-2 px-3 text-right font-mono text-xs font-bold text-gray-800 whitespace-nowrap">
                                  {fmtCurrency(sectionTotal(s))}
                                </td>
                              ))}
                              <td className={`py-2 px-3 text-right font-mono text-xs font-bold whitespace-nowrap ${(latestSec - prevSec) >= 0 ? "text-green-600" : "text-red-600"}`}>
                                {prev ? fmtCurrency(latestSec - prevSec) : "—"}
                              </td>
                              <td />
                            </tr>
                          </React.Fragment>
                        );
                      })}

                      {/* TOTAL NET WORTH */}
                      <tr style={{ background: "#1F4E79" }}>
                        <td colSpan={4} className="py-3 px-4 text-sm font-bold text-white uppercase tracking-wide">TOTAL NET WORTH (excl. kids RESP)</td>
                        {displaySnaps.map(s => (
                          <td key={s.date} className="py-3 px-3 text-right font-mono text-sm font-bold text-white whitespace-nowrap">
                            {fmtCurrency(calcNW(s))}
                          </td>
                        ))}
                        <td className={`py-3 px-3 text-right font-mono text-sm font-bold whitespace-nowrap ${nwChange >= 0 ? "text-green-300" : "text-red-300"}`}>
                          {nwChange != null ? fmtCurrency(nwChange) : "—"}
                        </td>
                        <td style={{ background: "#1F4E79" }} />
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Milestone Tracker */}
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
                <div className="px-5 py-3 text-sm font-bold text-white uppercase tracking-wide" style={{ background: "#C55A11" }}>
                  MILESTONE TRACKER
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-gray-50 border-b border-gray-100 text-xs text-gray-500 font-semibold uppercase tracking-wide">
                        <th className="py-2.5 px-4 text-left">Milestone</th>
                        <th className="py-2.5 px-3 text-right">Target</th>
                        <th className="py-2.5 px-3 text-right">Current</th>
                        <th className="py-2.5 px-3 text-right">Gap</th>
                        <th className="py-2.5 px-3 text-left w-48">Progress</th>
                        <th className="py-2.5 px-3 text-center">% Done</th>
                        <th className="py-2.5 px-3 text-left">Est. Timeline</th>
                      </tr>
                    </thead>
                    <tbody>
                      {NW_MILESTONES.map((m, i) => {
                        const current = latestNW;
                        const pct     = Math.min(current / m.target, 1);
                        const gap     = m.target - current;
                        return (
                          <tr key={m.id} className={`border-b border-gray-50 ${i%2===0?"bg-white":"bg-gray-50/40"}`}>
                            <td className="py-2.5 px-4 font-medium text-gray-800">{m.label}</td>
                            <td className="py-2.5 px-3 text-right font-mono text-gray-700">{fmtCurrency(m.target)}</td>
                            <td className="py-2.5 px-3 text-right font-mono text-blue-700 font-semibold">{fmtCurrency(current)}</td>
                            <td className={`py-2.5 px-3 text-right font-mono font-semibold ${gap > 0 ? "text-red-600" : "text-green-600"}`}>{fmtCurrency(gap)}</td>
                            <td className="py-2.5 px-3">
                              <div className="h-2.5 bg-gray-100 rounded-full overflow-hidden w-40">
                                <div className="h-full bg-green-500 rounded-full bar" style={{ width: `${pct*100}%` }} />
                              </div>
                            </td>
                            <td className="py-2.5 px-3 text-center text-xs font-semibold text-gray-700">{(pct*100).toFixed(1)}%</td>
                            <td className="py-2.5 px-3 text-xs text-gray-400">{m.timeline}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Snapshot History */}
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div className="px-5 py-3 text-sm font-bold text-white uppercase tracking-wide" style={{ background: "#1F4E79" }}>
                  SNAPSHOT HISTORY
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-gray-50 border-b border-gray-100 text-xs text-gray-500 font-semibold uppercase tracking-wide">
                        <th className="py-2.5 px-4 text-left">Date</th>
                        <th className="py-2.5 px-3 text-right">Net Worth</th>
                        <th className="py-2.5 px-3 text-right">Change $</th>
                        <th className="py-2.5 px-3 text-right">Change %</th>
                        <th className="py-2.5 px-3 w-10" />
                      </tr>
                    </thead>
                    <tbody>
                      {[...snapshots].reverse().map((s, ri) => {
                        const idx  = snapshots.length - 1 - ri;
                        const nw   = calcNW(s);
                        const prevS = snapshots[idx - 1];
                        const pnw  = prevS ? calcNW(prevS) : null;
                        const chg  = pnw != null ? nw - pnw : null;
                        const pct  = pnw ? ((nw - pnw) / Math.abs(pnw)) * 100 : null;
                        return (
                          <tr key={s.date} className="border-b border-gray-50 hover:bg-gray-50 group">
                            <td className="py-2.5 px-4 font-medium text-gray-700">{s.date}</td>
                            <td className="py-2.5 px-3 text-right font-mono font-semibold text-gray-900">{fmtCurrency(nw)}</td>
                            <td className={`py-2.5 px-3 text-right font-mono font-semibold ${chg==null?"text-gray-300":chg>=0?"text-green-600":"text-red-600"}`}>
                              {chg != null ? fmtCurrency(chg) : "—"}
                            </td>
                            <td className={`py-2.5 px-3 text-right font-mono text-xs ${pct==null?"text-gray-300":pct>=0?"text-green-600":"text-red-600"}`}>
                              {pct != null ? `${pct >= 0 ? "+" : ""}${pct.toFixed(2)}%` : "—"}
                            </td>
                            <td className="py-2.5 px-3 text-right">
                              <button onClick={() => deleteSnapshot(idx)}
                                className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400 transition-all text-base">✕</button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // ROOT — TAB SHELL
    // ═══════════════════════════════════════════════════════════════════════════
    function Root() {
      const [tab, setTab] = useState("expenses");
      return (
        <div className="min-h-screen" style={{ background: "#f8fafc" }}>
          {/* Tab nav */}
          <div className="border-b border-gray-200 bg-white sticky top-0 z-40 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 md:px-8 flex gap-1 pt-2">
              {[
                { id: "expenses",  label: "💳 Expenses" },
                { id: "networth",  label: "📈 Net Worth" },
              ].map(t => (
                <button key={t.id} onClick={() => setTab(t.id)}
                  className={`px-5 py-2.5 text-sm font-medium rounded-t-xl transition-colors border-b-2 ${tab === t.id ? "border-blue-600 text-blue-600 bg-blue-50" : "border-transparent text-gray-500 hover:text-gray-700"}`}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>

          {tab === "expenses" ? <App /> : <NetWorthTab />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
